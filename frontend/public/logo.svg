<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="60" cy="60" r="52" fill="url(#mainGradient)" filter="url(#shadow)"/>

  <!-- 信封主体 - 白色 -->
  <path d="M 25 45 L 60 70 L 95 45" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 25 45 L 25 82 Q 25 88 31 88 L 89 88 Q 95 88 95 82 L 95 45" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 信封封口折线 -->
  <path d="M 25 45 L 43 62 L 60 45 L 77 62 L 95 45" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- 数字"1" - 巧妙融入设计中 -->
  <text x="60" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="white" text-anchor="middle" opacity="0.15">1</text>

  <!-- 底部装饰线 -->
  <line x1="35" y1="78" x2="85" y2="78" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
